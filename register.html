<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione - BookEd</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(to right, #dceeff, #efe9ff);
      font-family: 'Roboto', sans-serif;
      margin: 0;
      color: #333;
    }

    .menu {
      background-color: #2c3e50;
      position: fixed;
      width: 100%;
      padding: 15px 0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      color: #ecf0f1;
      display: flex;
      justify-content: center;
      z-index: 1000;
    }

    .menu a {
      text-decoration: none;
      color: #ecf0f1;
      margin: 0 15px;
      font-weight: bold;
      transition: color 0.3s;
    }

    .menu a:hover {
      color: #3498db;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .form-wrapper {
      background-color: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      color: #333;
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: bold;
      color: #555;
      margin-bottom: 5px;
    }

    input[type="text"], input[type="password"] {
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 25px;
      margin-bottom: 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .radio-group {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .radio-group input[type="radio"] {
      display: none;
    }

    .radio-group label {
      position: relative;
      padding-left: 35px;
      margin-right: 20px;
      cursor: pointer;
      font-size: 16px;
      user-select: none;
    }

    .radio-group label:before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background-color: #ddd;
    }

    .radio-group input[type="radio"]:checked + label:before {
      background-color: #3498db;
    }


    input[type="submit"] {
      background-color: #e74c3c;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: background-color 0.3s;
      text-align: center;
      display: block;
      width: 100%;
      box-sizing: border-box;
    }

    input[type="submit"]:hover {
      background-color: #c0392b;
    }
  </style>
</head>

<body>
<div class="menu">
  <a href="index.html#start">Return to Login</a>
  <a href="index.html#primo">Chi siamo</a>
  <a href="index.html#secondo">Come funziona</a>
  <a href="index.html#terzo">Contatti</a>
</div>
<div class="container">
  <div class="form-wrapper">
    <h2>Registrati</h2>
    <form action="/register" method="post">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome">
      <label for="cognome">Cognome:</label>
      <input type="text" id="cognome" name="cognome">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password">
      <label id="Venditore">Venditore:</label>
      <div class="radio-group">
        <input type="radio" id="si" name="capodistato" value="Si">
        <label for="si">Si</label>
        <input type="radio" id="no" name="capodistato" value="No">
        <label for="no">No</label>
      </div>
      <input type="submit" value="Registrati">
    </form>
  </div>
</div>
</body>

</html>
