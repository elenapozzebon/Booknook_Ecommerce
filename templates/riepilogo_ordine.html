<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riepilogo Ordine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            color: #333;
            background: linear-gradient(336deg, rgba(231, 90, 12, .8), rgba(231, 90, 12, 0) 70.71%),
                        linear-gradient(127deg, rgba(102, 194, 207, .8), rgba(102, 194, 207, 0) 70.71%),
                        linear-gradient(217deg, rgba(17, 57, 73, .8), rgba(17, 57, 73, 0) 70.71%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px; /* Spazio sopra per il logo */
        }

        header {
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            height: 200px;
            position: relative;
        }

        .header-left {
            display: flex;
            align-items: center;
            position: absolute;
            justify-content: center;
        }

        .header-left img {
            width: 150px;
            height: 150px;
            margin-right: 10px;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .header-left img:hover {
            transform: scale(1.1); /* Effetto zoom */
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3); /* Effetto ombra */
        }

        h1 {
            color: #1B5C75;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.8em;
        }

        main {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
        }

        p {
            font-size: 16px;
            margin-bottom: 10px;
            color: #555;
        }

        form {
            margin-top: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"], select {
            width: 96%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #metodo_pagamento{
            width: 99%;
        }

        button {
            background-color: #1B5C75;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background-color: #113949;
        }

        a {
            display: block;
            margin-top: 20px;
            color: #1B5C75;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            background: none;
            color: #264466;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="{% if cosa_sono %}{{ url_for('solo_venditore') }}{% else %}{{ url_for('solo_compratore') }}{% endif %}">
                <img src="{{ url_for('static', filename='img/logo2.jpg') }}" alt="BookNook Logo">
            </a>
        </div>
    </header>

    <main>
        <h1>Riepilogo Ordine</h1>

        <p><strong>Libro:</strong> {{ libro.titolo }}</p>
        <p><strong>Prezzo:</strong> €{{ venditore_libro.prezzo }}</p>
        <p><strong>Quantità:</strong> {{ quantita_carrello }}</p>

        <form method="POST" action="{{ url_for('crea_ordine', id_libro=libro.id_libro, id_venditore=venditore_libro.id_venditore) }}">
            <div>
                <label for="indirizzo_spedizione">Indirizzo di Spedizione:</label>
                <input type="text" id="indirizzo_spedizione" name="indirizzo_spedizione" value="{{ indirizzo_spedizione }}" required>
            </div>

            <div>
                <label for="metodo_pagamento">Metodo di Pagamento:</label>
                <select id="metodo_pagamento" name="metodo_pagamento" required>
                    <option value="Carta di Credito">Carta di Credito</option>
                    <option value="PayPal">PayPal</option>
                    <option value="Bonifico Bancario">Bonifico Bancario</option>
                    <option value="Alla Consegna">Alla Consegna</option>
                </select>
            </div>

            <button type="submit">Conferma Acquisto</button>
        </form>

        <a href="{{ url_for('carrello') }}">Torna al carrello</a>
    </main>

    <footer>
        &copy; 2024 BookNook - Tutti i diritti riservati
    </footer>
</body>
</html>
